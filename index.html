<!DOCTYPE html>
<html>
<head>
  <title>AKRIVO AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #1e3a8a);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#chatContainer {
  width: 450px;
  max-width: 95%;
  height: 650px;
  backdrop-filter: blur(20px);
  background: rgba(15, 23, 42, 0.7);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0, 200, 255, 0.2);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

#header {
  padding: 18px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  background: rgba(0,0,0,0.3);
  letter-spacing: 1px;
}

.status {
  font-size: 12px;
  color: #22c55e;
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  padding: 12px 16px;
  border-radius: 14px;
  max-width: 75%;
  animation: fadeIn 0.3s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.user {
  background: #0ea5e9;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.1);
  align-self: flex-start;
}

#inputContainer {
  display: flex;
  padding: 12px;
  gap: 10px;
  background: rgba(0,0,0,0.3);
}

#userInput {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
}

.main {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #0ea5e9, #3b82f6);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(14,165,233,0.6);
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">AKRIVO 🚀</div>
  <button class="menu-btn">➕ New Chat</button>
  <button class="menu-btn">🤖 AI Models</button>
  <button class="menu-btn">📜 History</button>
  <button class="menu-btn" onclick="activatePremium()">⭐ Activate Premium ₹29</button>
  <button class="menu-btn">⚙ Settings</button>
</div>

<div class="main">
  <div class="topbar">
  <div style="font-weight: bold; font-size: 18px;">
    AKRIVO AI ⚡
  </div>
  <div style="font-size: 12px; color: #22c55e;">
    ● Online
  </div>
</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask anything...">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const DAILY_LIMIT = 9;

// Get user data from localStorage
function getUserData() {
  let data = JSON.parse(localStorage.getItem("akrivoUser"));
  if (!data) {
    data = { date: new Date().toLocaleDateString(), count: 0, premium: false };
    localStorage.setItem("akrivoUser", JSON.stringify(data));
  }
  if (data.date !== new Date().toLocaleDateString()) {
    data.date = new Date().toLocaleDateString();
    data.count = 0;
    localStorage.setItem("akrivoUser", JSON.stringify(data));
  }
  return data;
}

// Activate premium (demo)
function activatePremium() {
  let data = getUserData();
  data.premium = true;
  localStorage.setItem("akrivoUser", JSON.stringify(data));
  alert("🎉 Premium Activated! Unlimited messages now available.");
}

// Send message
async function sendMessage() {
  let data = getUserData();

  if (!data.premium && data.count >= DAILY_LIMIT) {
    alert("Daily Free Limit Reached 🚫\nUpgrade to Premium ₹29 for unlimited access.");
    return;
  }

  let input = document.getElementById("userInput");
  let message = input.value;
  if (message.trim() === "") return;

  if (!data.premium) data.count++;
  localStorage.setItem("akrivoUser", JSON.stringify(data));

  let chatBox = document.getElementById("chatBox");

  // User message
  let userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = message;
  chatBox.appendChild(userMsg);

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  // Bot typing
  let botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerText = "AKRIVO is typing...";
  chatBox.appendChild(botMsg);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch("https://akrivo-backend.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const dataAI = await response.json();
    botMsg.innerText = dataAI.content || "AI did not respond.";
    chatBox.scrollTop = chatBox.scrollHeight;
  } catch (error) {
    botMsg.innerText = "Error connecting to AI.";
    console.error(error);
  }
}

document.getElementById("userInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault(); // stops page refresh
    sendMessage();
  }
});

</script>

</body>
</html>
